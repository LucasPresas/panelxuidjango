<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Lurzavic - Acceso</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #0f0f0f; height: 100vh; display: flex; align-items: center; justify-content: center; font-family: sans-serif; }
        .login-card { background: #1a1a1a; border: 1px solid #333; border-radius: 12px; width: 380px; padding: 2rem; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .btn-primary { background: #6c5ce7; border: none; padding: 0.8rem; font-weight: bold; }
        .btn-primary:hover { background: #5849c4; }
        input { background: #252525 !important; border: 1px solid #444 !important; color: white !important; }
        input::placeholder { color: #888 !important; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2 class="text-center mb-4 text-white fw-bold">LURZAVIC <span class="text-primary">IPTV</span></h2>
        <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
                <input type="text" name="username" class="form-control" placeholder="Nombre de usuario" required>
            </div>
            <div class="mb-3">
                <input type="password" name="password" class="form-control" placeholder="Contraseña" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 mb-3">INGRESAR AL PANEL</button>
            {% if form.errors %}
                <div class="alert alert-danger py-2 small text-center">Usuario o clave incorrectos</div>
            {% endif %}
        </form>
        <p class="text-muted text-center small mb-0">© 2026 Lurzavic Systems</p>
    </div>
</body>
</html>
