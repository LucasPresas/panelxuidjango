<!DOCTYPE html>
<html>
<head>
    <title>Lurzavic - Acceso Reseller</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #121417; display: flex; align-items: center; height: 100vh; color: white; }
        .card { background: #1a1d21; border: 1px solid #2d3238; border-radius: 15px; width: 100%; max-width: 400px; padding: 30px; }
    </style>
</head>
<body>
    <div class="container d-flex justify-content-center">
        <div class="card shadow-lg">
            <h3 class="text-center fw-bold mb-4">LURZAVIC <span class="text-primary">RESELLER</span></h3>
            {% if messages %}{% for m in messages %}<div class="alert alert-danger small">{{ m }}</div>{% endfor %}{% endif %}
            <form method="POST">
                {% csrf_token %}
                <div class="mb-3"><input type="text" name="username" class="form-control bg-dark text-white border-secondary" placeholder="Usuario" required></div>
                <div class="mb-3"><input type="password" name="password" class="form-control bg-dark text-white border-secondary" placeholder="Contraseña" required></div>
                <button type="submit" class="btn btn-primary w-100 fw-bold">INGRESAR AL PANEL</button>
            </form>
        </div>
    </div>
</body>
</html>
