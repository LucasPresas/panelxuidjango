<!DOCTYPE html>
<html>
<head>
    <title>Importar M3U</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-white p-5">
    <div class="container card bg-secondary p-4 shadow">
        <h2>🚀 Importador Masivo M3U</h2>
        <p>Pegá acá el contenido de tu archivo .m3u</p>
        <form method="POST">
            {% csrf_token %}
            <textarea name="m3u_text" class="form-control mb-3" rows="15" placeholder="#EXTM3U..."></textarea>
            <button type="submit" class="btn btn-primary w-100 fw-bold">PROCESAR E IMPORTAR</button>
            <a href="/admin/panel/canal/" class="btn btn-link text-white mt-2">Volver atrás</a>
        </form>
    </div>
</body>
</html>
